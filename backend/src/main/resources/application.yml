server:
  port: ${BACKEND_PORT:8080}

spring:
  application:
    name: mediai-backend
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/mediai_db}
    username: ${POSTGRES_USER:mediai}
    password: ${POSTGRES_PASSWORD:mediai123}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:5}
      minimum-idle: ${DB_POOL_MIN_IDLE:1}
      connection-timeout: ${DB_POOL_CONNECTION_TIMEOUT_MS:30000}
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:validate}
    defer-datasource-initialization: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  sql:
    init:
      mode: never
  flyway:
    enabled: true
    locations: classpath:db/migration
    out-of-order: false
    validate-on-migrate: true

ai:
  service:
    base-url: ${AI_SERVICE_URL:http://localhost:8000}
    evaluation-path: ${AI_SERVICE_EVALUATION_PATH:/api/v1/evaluate}
    explain-path: ${AI_SERVICE_EXPLAIN_PATH:/api/v1/explain}
    model-name: ${AI_MODEL_NAME:gpt-4o-mini}
    model-version: ${AI_MODEL_VERSION:1.0}

security:
  jwt:
    issuer: ${JWT_ISSUER:MediAI}
    access-secret: ${JWT_ACCESS_SECRET:change_me_access_secret}
    refresh-secret: ${JWT_REFRESH_SECRET:change_me_refresh_secret}
    access-expires-in: ${JWT_ACCESS_EXPIRES_IN:15m}
    refresh-expires-in: ${JWT_REFRESH_EXPIRES_IN:7d}

logging:
  level:
    root: INFO
    com.mediai: DEBUG

